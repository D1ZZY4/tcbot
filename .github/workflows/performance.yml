name: Performance Regression Detection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Run performance benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Create benchmark script
        run: |
          cat > benchmark.py << 'EOF'
          import asyncio
          import time
          import sys
          from pathlib import Path

          # Add project to path
          sys.path.insert(0, str(Path.cwd()))

          async def benchmark_batch_queries():
              """Benchmark batch query performance"""
              from tcbot.database import users_cache
              from tcbot.database.mongos import connect

              await connect()

              user_ids = list(range(1, 101))  # 100 users

              # Batch query
              start = time.perf_counter()
              result = await users_cache.get_first_names_batch(user_ids)
              batch_time = time.perf_counter() - start

              return {
                  "batch_query_100_users_ms": round(batch_time * 1000, 2),
                  "batch_query_per_user_ms": round(batch_time * 1000 / 100, 2),
              }

          async def benchmark_mention_data():
              """Benchmark mention data fetch"""
              from tcbot.database import users_cache
              from tcbot.database.mongos import connect

              await connect()

              user_ids = list(range(1, 51))  # 50 users

              start = time.perf_counter()
              result = await users_cache.get_mention_data_batch(user_ids)
              elapsed = time.perf_counter() - start

              return {
                  "mention_data_50_users_ms": round(elapsed * 1000, 2),
                  "mention_data_per_user_ms": round(elapsed * 1000 / 50, 2),
              }

          async def main():
              try:
                  results = {}

                  # Run benchmarks
                  results.update(await benchmark_batch_queries())
                  results.update(await benchmark_mention_data())

                  # Write results
                  with open("benchmark_results.txt", "w") as f:
                      for key, value in results.items():
                          f.write(f"{key}={value}\n")
                          print(f"{key}: {value}")

                  return 0
              except Exception as e:
                  print(f"Benchmark failed: {e}")
                  return 1

          if __name__ == "__main__":
              sys.exit(asyncio.run(main()))
          EOF

      - name: Run benchmarks
        id: bench
        env:
          BOT_TOKEN: "test:token"
          MONGODB_URI: "mongodb://localhost:27017"
          DB_NAME: "tcbot_bench"
          COMMUNITY_NAME: "TCF"
          OWNER_ID: "123456"
          LOGS: "-1001000000001"
          PROOFS: "-1001000000002"
          APPEALS: "-1001000000003"
        run: |
          uv run python benchmark.py 2>&1 | tee benchmark.log

          if [[ -f benchmark_results.txt ]]; then
            cat benchmark_results.txt >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Load baseline
        id: baseline
        run: |
          # Try to get baseline from main branch
          if git show origin/main:benchmark_baseline.txt > baseline.txt 2>/dev/null; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
            cat baseline.txt
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "No baseline found - this will become the new baseline"
          fi

      - name: Compare with baseline
        if: steps.baseline.outputs.has_baseline == 'true'
        id: compare
        run: |
          python - << 'PYEOF'
          import os
          import sys

          # Read current results
          current = {}
          try:
              with open("benchmark_results.txt") as f:
                  for line in f:
                      if "=" in line:
                          key, val = line.strip().split("=", 1)
                          current[key] = float(val)
          except:
              print("No current results")
              sys.exit(0)

          # Read baseline
          baseline = {}
          try:
              with open("baseline.txt") as f:
                  for line in f:
                      if "=" in line:
                          key, val = line.strip().split("=", 1)
                          baseline[key] = float(val)
          except:
              print("No baseline")
              sys.exit(0)

          # Compare
          regressions = []
          improvements = []

          for key in current:
              if key in baseline:
                  curr = current[key]
                  base = baseline[key]
                  diff_pct = ((curr - base) / base) * 100

                  if diff_pct > 10:  # >10% slower = regression
                      regressions.append(f"{key}: {base:.2f}ms → {curr:.2f}ms (+{diff_pct:.1f}%)")
                  elif diff_pct < -10:  # >10% faster = improvement
                      improvements.append(f"{key}: {base:.2f}ms → {curr:.2f}ms ({diff_pct:.1f}%)")

          # Write summary
          with open("comparison.txt", "w") as f:
              if regressions:
                  f.write("## ⚠️ Performance Regressions\n\n")
                  for r in regressions:
                      f.write(f"- {r}\n")
                  f.write("\n")

              if improvements:
                  f.write("## ✅ Performance Improvements\n\n")
                  for i in improvements:
                      f.write(f"- {i}\n")
                  f.write("\n")

              if not regressions and not improvements:
                  f.write("## ✅ No significant performance changes\n\n")
                  f.write("All metrics within ±10% of baseline.\n")

          # Output
          with open("comparison.txt") as f:
              print(f.read())

          if regressions:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_regression=true\n")
          PYEOF

      - name: Save new baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [[ -f benchmark_results.txt ]]; then
            cp benchmark_results.txt benchmark_baseline.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add benchmark_baseline.txt
            git commit -m "chore: Update performance baseline [skip ci]" || true
            git push || true
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.baseline.outputs.has_baseline == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let comparison = "No comparison available";
            try {
              comparison = fs.readFileSync('comparison.txt', 'utf8');
            } catch {}

            const body = `## 📊 Performance Benchmark Results

            ${comparison}

            <details>
            <summary>Full benchmark log</summary>

            \`\`\`
            ${fs.readFileSync('benchmark.log', 'utf8')}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Create issue on regression
        if: steps.compare.outputs.has_regression == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Performance regression detected in ${{ github.sha }}" \
            --body "$(cat comparison.txt)" \
            --label "performance,bug"
