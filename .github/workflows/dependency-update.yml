name: Dependency Updates

on:
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-dependencies:
    name: Update dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Backup current lock
        run: cp uv.lock uv.lock.backup

      - name: Update dependencies
        id: update
        run: |
          echo "Updating dependencies..."
          uv lock --upgrade 2>&1 | tee update.log

          if diff -q uv.lock uv.lock.backup > /dev/null; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "Dependencies updated!"
          fi

      - name: Show changes
        if: steps.update.outputs.has_updates == 'true'
        run: |
          echo "## Dependency Changes" >> changes.md
          echo "" >> changes.md
          echo "\`\`\`diff" >> changes.md
          diff -u uv.lock.backup uv.lock | head -100 >> changes.md || true
          echo "\`\`\`" >> changes.md

      - name: Install updated dependencies
        if: steps.update.outputs.has_updates == 'true'
        run: uv sync --frozen

      - name: Create PR
        if: steps.update.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="deps/auto-update-$(date +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add uv.lock
          git commit -m "chore: Update dependencies

          Auto-updated by GitHub Actions

          $(cat changes.md)"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: Auto-update dependencies" \
            --body "$(cat <<EOF
          ## Automated Dependency Update

          This PR updates project dependencies to their latest compatible versions.

          ### Changes
          $(cat changes.md)
          EOF
          )" \
            --label "dependencies" \
            --base main \
            --head "$BRANCH"

      - name: Telegram notification
        if: always() && steps.update.outputs.has_updates == 'true'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          python - << 'PYEOF'
          import json, os, sys, urllib.request

          token = os.getenv("BOT_TOKEN", "")
          owner_id = os.getenv("OWNER_ID", "")

          if not token or not owner_id or token.startswith("test:"):
              sys.exit(0)

          text = (
              "<b>Dependency Update</b>\n\n"
              "Dependencies updated\n"
              "Result: PR created\n\n"
              f'<a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View workflow</a>'
          )

          payload = json.dumps({
              "chat_id": owner_id,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
          }).encode()

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(req, timeout=15)
          except Exception as exc:
              print(f"Notification failed: {exc}", file=sys.stderr)
          PYEOF
