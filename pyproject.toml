[project]
name = "tgbot-tcf"
version = "1.0.0"
description = "Transsion Core Federation (TCF) Telegram bot"
requires-python = ">=3.12"
dependencies = [
    "python-telegram-bot[job-queue]==22.5",
    "motor>=3.7.1,<4",
    "flask>=3.1.0,<4",
    "python-dotenv>=1.0.0,<2",
    "ruff>=0.15.15",
]

[dependency-groups]
dev = ["ruff"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
