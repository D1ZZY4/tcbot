[project]
name = "tgbot-tcf"
version = "1.0.0"
description = "Transsion Core Federation (TCF) Telegram bot"
requires-python = ">=3.12"
dependencies = [
    "python-telegram-bot[job-queue]",
    "motor",
    "flask",
    "python-dotenv",
]

[dependency-groups]
dev = ["ruff"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["B", "C4", "E4", "E7", "E9", "F", "I", "RET", "SIM", "UP", "W"]
ignore = [
    "UP047",  # Generic functions: TypeVar-based style kept for ratelimiter compatibility
]
