[project]
name = "tgbot-tcf"
version = "1.0.0"
description = "Transsion Core Federation (TCF) Telegram bot"
requires-python = ">=3.12"
dependencies = [
    "python-telegram-bot",  # Migrate to latest channel version
    "motor",                # Migrate to latest channel version
    "flask",                # Migrate to latest channel version
    "python-dotenv",        # Migrate to latest channel version
    "ruff",
]

[dependency-groups]
dev = ["ruff"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
