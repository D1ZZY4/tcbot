[project]
name = "tgbot-tcf"
version = "1.0.0"
description = "Transsion Core Federation (TCF) Telegram bot"
requires-python = ">=3.12"
dependencies = [
    "python-telegram-bot[job-queue]==22.5",
    "motor>=3.7.1,<4",
    "flask>=3.1.0,<4",
    "python-dotenv>=1.0.0,<2",
]

[project.optional-dependencies]
test = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]
dev = [
    "ruff",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra -q"
filterwarnings = [
    "ignore:If 'per_message=False', 'CallbackQueryHandler'.*:UserWarning",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
